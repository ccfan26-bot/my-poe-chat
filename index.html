<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>Poe Claude Chat</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      display: flex;
      flex-direction: column;
      height: 100vh;
    }

    h2 {
      text-align: center;
      margin: 10px 0;
    }

    /* ✅ 聊天区域 */
    #chat {
      flex: 1;
      overflow-y: auto;
      padding: 15px;
      background: #f5f5f5;
    }

    .user {
      color: blue;
      margin-bottom: 8px;
    }

    .assistant {
      color: green;
      margin-bottom: 15px;
    }

    /* ✅ 输入区域固定底部 */
    #inputArea {
      border-top: 1px solid #ddd;
      padding: 10px;
      background: white;
      display: flex;
      gap: 10px;
    }

    textarea {
      flex: 1;
      resize: none;
      padding: 8px;
      font-size: 14px;
      height: 60px;
    }

    button {
      padding: 8px 16px;
      cursor: pointer;
    }
  </style>
</head>
<body>

<h2>Claude Sonnet 4.5</h2>

<div id="chat"></div>

<div id="inputArea">
  <textarea id="input" placeholder="输入内容..."></textarea>
  <button onclick="send()">发送</button>
</div>

<script>
let conversation = [];

async function send() {
  const input = document.getElementById("input");
  const chatDiv = document.getElementById("chat");

  const message = input.value.trim();
  if (!message) return;

  conversation.push({
    role: "user",
    content: message
  });

  renderChat();
  input.value = "";

  try {
    const response = await fetch("/api/chat", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ messages: conversation })
    });

    const data = await response.json();

    if (!response.ok) {
      alert("Error: " + JSON.stringify(data));
      return;
    }

    conversation.push({
      role: "assistant",
      content: data.reply
    });

    // ✅ 限制最近 5 轮
    const MAX_MESSAGES = 10;
    if (conversation.length > MAX_MESSAGES) {
      conversation = conversation.slice(-MAX_MESSAGES);
    }

    renderChat();

  } catch (error) {
    alert("Network error");
  }
}

function renderChat() {
  const chatDiv = document.getElementById("chat");
  chatDiv.innerHTML = "";

  conversation.forEach(msg => {
    const div = document.createElement("div");
    div.className = msg.role;
    div.innerText =
      (msg.role === "user" ? "你: " : "Claude: ") + msg.content;
    chatDiv.appendChild(div);
  });

  // ✅ 自动滚动到底部
  chatDiv.scrollTop = chatDiv.scrollHeight;
}
</script>

</body>
</html>
