<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>Poe Claude Chat</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      max-width: 700px;
      margin: 40px auto;
    }
    textarea {
      width: 100%;
      height: 100px;
      padding: 8px;
      font-size: 14px;
    }
    button {
      margin-top: 10px;
      padding: 8px 16px;
      cursor: pointer;
    }
    #reply {
      margin-top: 20px;
      white-space: pre-wrap;
      background: #f5f5f5;
      padding: 12px;
      border-radius: 6px;
      min-height: 60px;
    }
    .loading {
      color: gray;
      font-style: italic;
    }
  </style>
</head>
<body>

<h2>Claude Sonnet 4.5 (via Poe)</h2>

<textarea id="input" placeholder="输入内容..."></textarea>
<br/>
<button onclick="send()">发送</button>

<div id="reply"></div>

<script>
async function send() {
  const input = document.getElementById("input");
  const replyDiv = document.getElementById("reply");

  const message = input.value.trim();
  if (!message) return;

  replyDiv.innerText = "Thinking...";
  replyDiv.classList.add("loading");

  try {
    const response = await fetch("/api/chat", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ message })
    });

    const data = await response.json();

    if (!response.ok) {
      replyDiv.innerText = "Error: " + JSON.stringify(data);
    } else {
      replyDiv.innerText = data.reply;
    }

  } catch (error) {
    replyDiv.innerText = "Network error.";
  }

  replyDiv.classList.remove("loading");
}
</script>

</body>
</html>
