<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>Claude Chat</title>

<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

<style>
:root {
  --user: #007aff;
  --assistant: #ffffff;
  --bg: #f2f2f7;
}

/* ✅ 字体自动缩放 */
html {
  font-size: clamp(14px, 2.5vw, 18px);
}

body {
  margin: 0;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  background: var(--bg);
  display: flex;
  flex-direction: column;
  height: 100dvh;
}

header {
  text-align: center;
  padding: 12px;
  font-weight: 600;
  background: white;
  border-bottom: 1px solid #ddd;
}

#chat {
  flex: 1;
  overflow-y: auto;
  padding: 15px;
  display: flex;
  flex-direction: column;
  gap: 12px;
}

/* ✅ 气泡 */
.bubble {
  max-width: 85%;
  padding: 12px;
  border-radius: 16px;
  line-height: 1.6;
  word-wrap: break-word;
  animation: fadeIn 0.2s ease;
}

.user {
  align-self: flex-end;
  background: var(--user);
  color: white;
}

.assistant {
  align-self: flex-start;
  background: var(--assistant);
  color: black;
}

/* ✅ Thinking 动画 */
.thinking {
  display: flex;
  gap: 5px;
}

.dot {
  width: 6px;
  height: 6px;
  background: #999;
  border-radius: 50%;
  animation: blink 1.4s infinite both;
}

.dot:nth-child(2) { animation-delay: 0.2s; }
.dot:nth-child(3) { animation-delay: 0.4s; }

@keyframes blink {
  0% { opacity: 0.2; }
  20% { opacity: 1; }
  100% { opacity: 0.2; }
}

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(5px); }
  to { opacity: 1; transform: translateY(0); }
}

/* ✅ 输入区 */
#inputArea {
  display: flex;
  padding: 10px;
  gap: 8px;
  background: white;
  border-top: 1px solid #ddd;
}

textarea {
  flex: 1;
  resize: none;
  padding: 10px;
  font-size: 1rem;
  border-radius: 12px;
  border: 1px solid #ccc;
  max-height: 150px;
  overflow-y: auto;
}

button {
  background: #007aff;
  color: white;
  border: none;
  padding: 0 16px;
  border-radius: 12px;
  font-size: 1rem;
}

/* ✅ Markdown 样式 */
.assistant pre {
  background: #1e1e1e;
  color: #eee;
  padding: 10px;
  border-radius: 8px;
  overflow-x: auto;
}

.assistant code {
  background: #eee;
  padding: 2px 4px;
  border-radius: 4px;
}
</style>
</head>

<body>

<header>Claude Sonnet 4.5</header>

<div id="chat"></div>

<div id="inputArea">
  <textarea id="input" placeholder="发消息..." rows="1"></textarea>
  <button onclick="send()">发送</button>
</div>

<script>
let conversation = [];
let loading = false;

/* ✅ 自动高度增长 */
const textarea = document.getElementById("input");
textarea.addEventListener("input", () => {
  textarea.style.height = "auto";
  textarea.style.height = textarea.scrollHeight + "px";
});

/* ✅ 发送消息 */
async function send() {
  if (loading) return;

  const message = textarea.value.trim();
  if (!message) return;

  conversation.push({ role: "user", content: message });
  textarea.value = "";
  textarea.style.height = "auto";

  renderChat();

  showThinking();

  loading = true;

  try {
    const response = await fetch("/api/chat", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ messages: conversation })
    });

    const data = await response.json();

    removeThinking();

    conversation.push({
      role: "assistant",
      content: data.reply
    });

    /* ✅ 限制最近5轮 */
    const MAX = 10;
    if (conversation.length > MAX) {
      conversation = conversation.slice(-MAX);
    }

    renderChat();
  } catch (err) {
    removeThinking();
    alert("网络错误");
  }

  loading = false;
}

/* ✅ 渲染聊天 */
function renderChat() {
  const chat = document.getElementById("chat");
  chat.innerHTML = "";

  conversation.forEach(msg => {
    const div = document.createElement("div");
    div.className = "bubble " + msg.role;

    if (msg.role === "assistant") {
      div.innerHTML = marked.parse(msg.content);
    } else {
      div.innerText = msg.content;
    }

    chat.appendChild(div);
  });

  chat.scrollTop = chat.scrollHeight;
}

/* ✅ Thinking 状态 */
function showThinking() {
  const chat = document.getElementById("chat");

  const div = document.createElement("div");
  div.className = "bubble assistant thinking";
  div.id = "thinking";

  div.innerHTML = `
    <div class="dot"></div>
    <div class="dot"></div>
    <div class="dot"></div>
  `;

  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
}

function removeThinking() {
  const t = document.getElementById("thinking");
  if (t) t.remove();
}

/* ✅ Enter发送 */
textarea.addEventListener("keydown", function(e) {
  if (e.key === "Enter" && !e.shiftKey) {
    e.preventDefault();
    send();
  }
});

/* ✅ 下拉刷新加载历史（模拟） */
let startY = 0;
let pulling = false;

const chatDiv = document.getElementById("chat");

chatDiv.addEventListener("touchstart", e => {
  if (chatDiv.scrollTop === 0) {
    startY = e.touches[0].clientY;
    pulling = true;
  }
});

chatDiv.addEventListener("touchmove", e => {
  if (!pulling) return;
  let diff = e.touches[0].clientY - startY;
  if (diff > 80) {
    pulling = false;
    loadMoreHistory();
  }
});

function loadMoreHistory() {
  alert("这里可以加载更早历史记录（接数据库即可）");
}
</script>

</body>
</html>
