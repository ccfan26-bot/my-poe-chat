<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Poe Claude Chat</title>

  <style>
    :root {
      --bg: #f2f2f7;
      --user: #007aff;
      --assistant: #e5e5ea;
    }

    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: var(--bg);
      display: flex;
      flex-direction: column;
      height: 100dvh; /* ✅ 适配手机地址栏变化 */
    }

    header {
      text-align: center;
      padding: 12px;
      font-weight: 600;
      background: white;
      border-bottom: 1px solid #ddd;
    }

    /* ✅ 聊天区域 */
    #chat {
      flex: 1;
      overflow-y: auto;
      padding: 15px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .bubble {
      max-width: 80%;
      padding: 10px 14px;
      border-radius: 18px;
      line-height: 1.4;
      word-wrap: break-word;
      font-size: 15px;
    }

    .user {
      align-self: flex-end;
      background: var(--user);
      color: white;
      border-bottom-right-radius: 4px;
    }

    .assistant {
      align-self: flex-start;
      background: var(--assistant);
      color: black;
      border-bottom-left-radius: 4px;
    }

    /* ✅ 输入区域 */
    #inputArea {
      display: flex;
      padding: 10px;
      gap: 8px;
      background: white;
      border-top: 1px solid #ddd;
    }

    textarea {
      flex: 1;
      resize: none;
      padding: 10px;
      font-size: 16px; /* ✅ 防止 iOS 自动缩放 */
      border-radius: 12px;
      border: 1px solid #ccc;
      outline: none;
      max-height: 120px;
    }

    button {
      background: #007aff;
      color: white;
      border: none;
      padding: 0 16px;
      border-radius: 12px;
      font-size: 15px;
    }

    button:active {
      opacity: 0.7;
    }
  </style>
</head>
<body>

<header>Claude Sonnet 4.5</header>

<div id="chat"></div>

<div id="inputArea">
  <textarea id="input" placeholder="发消息..." rows="1"></textarea>
  <button onclick="send()">发送</button>
</div>

<script>
let conversation = [];

async function send() {
  const input = document.getElementById("input");
  const message = input.value.trim();
  if (!message) return;

  conversation.push({
    role: "user",
    content: message
  });

  renderChat();
  input.value = "";

  try {
    const response = await fetch("/api/chat", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ messages: conversation })
    });

    const data = await response.json();

    if (!response.ok) {
      alert("Error: " + JSON.stringify(data));
      return;
    }

    conversation.push({
      role: "assistant",
      content: data.reply
    });

    // ✅ 只保留最近 5 轮
    const MAX_MESSAGES = 10;
    if (conversation.length > MAX_MESSAGES) {
      conversation = conversation.slice(-MAX_MESSAGES);
    }

    renderChat();

  } catch (error) {
    alert("网络错误");
  }
}

function renderChat() {
  const chatDiv = document.getElementById("chat");
  chatDiv.innerHTML = "";

  conversation.forEach(msg => {
    const div = document.createElement("div");
    div.className = "bubble " + msg.role;
    div.innerText = msg.content;
    chatDiv.appendChild(div);
  });

  chatDiv.scrollTop = chatDiv.scrollHeight;
}

/* ✅ Enter 发送，Shift+Enter 换行 */
document.getElementById("input").addEventListener("keydown", function(e) {
  if (e.key === "Enter" && !e.shiftKey) {
    e.preventDefault();
    send();
  }
});
</script>

</body>
</html>
